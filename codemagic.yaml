workflows:
  ios-release:
    name: Unity iOS Release

    instance_type: mac_mini_m2

    environment:
      xcode: latest

    scripts:
      - name: Archive
        script: |
          xcodebuild \
          -project Unity-iPhone.xcodeproj \
          -scheme Unity-iPhone \
          -configuration Release \
          -archivePath build/App.xcarchive \
          archive

      - name: Export IPA
        script: |
          xcodebuild \
          -exportArchive \
          -archivePath build/App.xcarchive \
          -exportPath build/export \
          -exportOptionsPlist ExportOptions.plist

    artifacts:
      - build/export/*.ipa