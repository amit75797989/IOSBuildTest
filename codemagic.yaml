workflows:
  ios-release:
    name: Unity iOS Release

    instance_type: mac_mini_m2

    integrations:
      app_store_connect: SunFarma

    environment:
      xcode: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.magicalorbs.test

    scripts:

      - name: Show Codemagic Environment
        script: |
          echo "===== APP STORE CONNECT ====="

          if [ -z "$APP_STORE_CONNECT_ISSUER_ID" ]; then
            echo "ISSUER_ID NOT FOUND"
          else
            echo "ISSUER_ID FOUND"
          fi

          if [ -z "$APP_STORE_CONNECT_KEY_IDENTIFIER" ]; then
            echo "KEY_IDENTIFIER NOT FOUND"
          else
            echo "KEY_IDENTIFIER FOUND"
          fi

          if [ -z "$APP_STORE_CONNECT_PRIVATE_KEY" ]; then
            echo "PRIVATE_KEY NOT FOUND"
          else
            echo "PRIVATE_KEY FOUND"
          fi

      - name: Verify Downloaded Certificates
        script: |
          echo "===== CERTIFICATES ====="
          find ~/Library -name "*.p12" || true

      - name: Verify Downloaded Profiles
        script: |
          echo "===== PROFILES ====="
          find ~/Library -name "*.mobileprovision" || true

      - name: Apply Profiles To Xcode Project
        script: |
          xcode-project use-profiles

      - name: Verify Signing Settings
        script: |
          echo "===== CODE_SIGN_STYLE ====="
          grep -n "CODE_SIGN_STYLE" Unity-iPhone.xcodeproj/project.pbxproj | head -50 || true

          echo "===== CODE_SIGN_IDENTITY ====="
          grep -n "CODE_SIGN_IDENTITY" Unity-iPhone.xcodeproj/project.pbxproj | head -50 || true

          echo "===== PROVISIONING_PROFILE_SPECIFIER ====="
          grep -n "PROVISIONING_PROFILE_SPECIFIER" Unity-iPhone.xcodeproj/project.pbxproj | head -50 || true

      - name: Install Pods
        script: |
          if [ -f Podfile ]; then
            pod install
          fi

      - name: Build Workspace
        script: |
          if [ -f Unity-iPhone.xcworkspace ]; then
            xcodebuild \
              -workspace Unity-iPhone.xcworkspace \
              -scheme Unity-iPhone \
              -configuration Release \
              -archivePath build/App.xcarchive \
              archive
          else
            xcodebuild \
              -project Unity-iPhone.xcodeproj \
              -scheme Unity-iPhone \
              -configuration Release \
              -archivePath build/App.xcarchive \
              archive
          fi

      - name: Export IPA
        script: |
          cat > exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa

    artifacts:
      - build/ipa/*.ipa
      - build/App.xcarchive

    publishing:
      email:
        recipients:
          - amit75797989@gmail.com