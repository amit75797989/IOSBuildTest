workflows:
  ios-release:
    name: Unity iOS Release

    instance_type: mac_mini_m2

    environment:
      xcode: latest

    scripts:
    
      - name: Fetch signing files
        script: |
    find $HOME -name "*.p12"
    find $HOME -name "*.mobileprovision"
          app-store-connect fetch-signing-files com.magicalorbs.test --type IOS_APP_STORE

      - name: Initialize keychain
        script: |
          keychain initialize

      - name: Add certificates
        script: |
          keychain add-certificates

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Configure Team ID
        script: |
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = RYPQCV96K9;/g' Unity-iPhone.xcodeproj/project.pbxproj

      - name: Archive App
        script: |
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive

    artifacts:
      - build/App.xcarchive