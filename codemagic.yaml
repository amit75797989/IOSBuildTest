workflows:
  ios-release:
    name: Unity iOS Release

    instance_type: mac_mini_m2

    environment:
      xcode: latest

    scripts:

      - name: Show signing config
        script: |
           grep -n "CODE_SIGN_STYLE" Unity-iPhone.xcodeproj/project.pbxproj | head -20
           grep -n "CODE_SIGN_IDENTITY" Unity-iPhone.xcodeproj/project.pbxproj | head -20
           grep -n "PROVISIONING_PROFILE" Unity-iPhone.xcodeproj/project.pbxproj | head -20

      - name: Configure Team ID
        script: |
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = RYPQCV96K9;/g' Unity-iPhone.xcodeproj/project.pbxproj

      - name: Fix signing settings
        script: |
          sed -i '' 's/iPhone Developer/Apple Distribution/g' Unity-iPhone.xcodeproj/project.pbxproj

      - name: Archive App
        script: |
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            DEVELOPMENT_TEAM=RYPQCV96K9 \
            CODE_SIGN_STYLE=Automatic \
            PRODUCT_BUNDLE_IDENTIFIER=com.magicalorbs.test \
            -allowProvisioningUpdates \
            -archivePath build/App.xcarchive \
            archive

    artifacts:
      - build/App.xcarchive