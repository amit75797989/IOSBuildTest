workflows:
  ios-release:
    name: Unity iOS Release

    instance_type: mac_mini_m2

    environment:
      xcode: latest

    scripts:
      - name: Configure Team ID
        script: |
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = RYPQCV96K9;/g' Unity-iPhone.xcodeproj/project.pbxproj

      - name: Apply Provisioning Profiles
        script: |
          xcode-project use-profiles

      - name: Verify Signing
        script: |
          grep DEVELOPMENT_TEAM Unity-iPhone.xcodeproj/project.pbxproj | head
          grep PRODUCT_BUNDLE_IDENTIFIER Unity-iPhone.xcodeproj/project.pbxproj | head

      - name: Archive App
        script: |
          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive

    artifacts:
      - build/App.xcarchive